name: Fetch RSS Articles

on:
  schedule:
    - cron: '0 21 * * *'  # 매일 오전 6시 KST (UTC 21:00 전날)
  workflow_dispatch:        # 수동 실행도 가능

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install feedparser

      - name: Run fetch script
        run: python scripts/fetch_rss.py

      - name: Commit updated articles
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/articles.json
          git diff --cached --quiet || git commit -m "chore: update articles $(date -u '+%Y-%m-%d')"
          git push
